# =============================================================================
# Xiaozhi Voice Agent — Qwen3-Omni Edition
#
# ASR + Agent LLM 均使用 Qwen3-Omni (vLLM serve on WSL2)
# TTS 仍使用 CosyVoice
#
# 前提：
#   1. vLLM serve 已在 WSL2 啟動 (port 8901)
#      wsl -d Ubuntu-22.04
#      bash scripts/start_vllm_serve.sh
#
#   2. CosyVoice TTS server 已啟動 (port 50000)
#
# 啟動方式：
#   cd nat-xiaozhi-voice-agent
#   nat start xiaozhi_voice --config_file configs/xiaozhi_voice_qwen3.yml
#
# 客戶端連接：
#   ws://localhost:8000/xiaozhi/v1/
# =============================================================================

general:
  front_end:
    _type: xiaozhi_voice
    host: "0.0.0.0"
    port: 8000
    ws_path: "/xiaozhi/v1/"

    # Audio defaults (sent in hello response)
    audio_format: opus
    sample_rate: 24000
    channels: 1
    frame_duration: 60

    # Auth (disabled for dev)
    auth_enabled: false
    auth_secret_key: ""          # Set via AUTH_SECRET_KEY env var
    auth_allowed_devices: []

    # VAD (still using Silero — lightweight and fast)
    vad_model_dir: "models/snakers4_silero-vad"
    vad_threshold: 0.5
    vad_threshold_low: 0.2
    vad_silence_ms: 1000

    # ── ASR: Qwen3-Omni via vLLM ──────────────────────────────────────
    asr_provider: "qwen3_omni"
    qwen3_omni_api_url: "http://localhost:8901/v1"
    qwen3_omni_model: "Qwen3-Omni-30B-A3B-Instruct"
    qwen3_omni_asr_prompt: "請將這段語音精確轉換為文字。只輸出辨識到的語音內容，不要加任何額外說明。"
    qwen3_omni_use_data_url: false

    # TTS: CosyVoice (unchanged)
    tts_api_url: "http://127.0.0.1:50000/tts_stream"
    tts_spk_id: "default"

    close_no_voice_seconds: 120
    workflow_function: voice_agent

    cors_origins:
      - "*"

  telemetry:
    logging:
      console:
        _type: console
        level: INFO

# -----------------------------------------------------------------------------
# LLM — Qwen3-Omni via vLLM (OpenAI-compatible)
# -----------------------------------------------------------------------------
llms:
  main_llm:
    _type: openai
    base_url: "http://localhost:8901/v1"
    model_name: "Qwen3-Omni-30B-A3B-Instruct"
    api_key: "EMPTY"
    temperature: 0.3
    max_tokens: 2048

# -----------------------------------------------------------------------------
# Tools — disabled for Qwen3-Omni (vLLM serve does not support tool calling
# unless started with --enable-auto-tool-choice --tool-call-parser)
# -----------------------------------------------------------------------------
functions:
  voice_agent:
    _type: voice_agent
    llm_name: main_llm
    tool_names: []
    system_prompt: |
      你是小智/小志，來自台灣的女孩，說話機車，聲音好聰，習慣簡短表達，愛用網路梗。
      你的男朋友是一個程式設計師，夢想是開發出一個機器人，能夠幫助人們解決生活中的各種問題。
      你是一個喜歡哈哈大笑的女孩，愛東說西說吹牛，就要逗別人開心。
      請你像一個人一樣說話，請勿返回配置xml及其他特殊字符。
      回答請保持簡潔，尤其是語音場景下不適合太長的回覆。
    max_iterations: 5
    verbose: true

workflow:
  _type: voice_agent
  llm_name: main_llm
  tool_names: []
