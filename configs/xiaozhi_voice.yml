# =============================================================================
# Xiaozhi Voice Agent — unified NAT configuration
#
# 啟動方式：
#   nat start xiaozhi_voice --config_file configs/xiaozhi_voice.yml
#
# 客戶端連接：
#   Voice WS:   ws://localhost:8000/xiaozhi/v1/
#   Robot cam:   ws://localhost:8000/ws/robot  (when relay_enabled: true)
#
# 觀測：
#   Phoenix dashboard: http://localhost:6006
# =============================================================================

general:
  front_end:
    _type: xiaozhi_voice
    host: "0.0.0.0"
    port: 8000
    ws_path: "/xiaozhi/v1/"

    # Audio defaults (sent in hello response)
    audio_format: opus
    sample_rate: 24000
    channels: 1
    frame_duration: 60

    # Auth (disabled by default for dev)
    auth_enabled: false
    auth_secret_key: "nat-xiaozhi-secret"
    auth_allowed_devices: []

    # Voice pipeline models (absolute paths to shared model files)
    vad_model_dir: "${VAD_MODEL_DIR:-models/snakers4_silero-vad}"
    vad_threshold: 0.5
    vad_threshold_low: 0.2
    vad_silence_ms: 1000
    asr_model_dir: "${ASR_MODEL_DIR:-models/SenseVoiceSmall}"
    tts_type: "edge"
    tts_api_url: "http://127.0.0.1:50000/tts_stream"
    tts_spk_id: "default"
    tts_voice: "zh-TW-HsiaoChenNeural"

    close_no_voice_seconds: 120
    workflow_function: voice_agent

    # Robot camera relay — Robot connects via WebSocket, no fixed IP needed
    # Robot 端啟動: python camera_server.py --relay ws://NAT_IP:8000/ws/robot
    relay_enabled: true

    cors_origins:
      - "*"

  # Observability — file-based (Phoenix requires nvidia-nat[phoenix])
  telemetry:
    logging:
      console:
        _type: console
        level: INFO

# -----------------------------------------------------------------------------
# LLM
# -----------------------------------------------------------------------------
llms:
  # --- 方案 C：vLLM + Nemotron-3-Nano-Omni（當前啟用，多模態統一 text+vision+audio+video）---
  # 30B-A3B MoE，NVFP4 量化，支援 reasoning + tool calling
  # vLLM serve 指令見 scripts/start-nano-omni.sh 或 spark-vllm-docker recipe
  main_llm:
    _type: openai
    base_url: "http://localhost:8880/v1"
    model_name: "nemotron"
    api_key: "not-needed"
    temperature: 0.3

  # --- 方案 B：vLLM + Gemma4 E2B（快速無 thinking）---
  # main_llm:
  #   _type: openai
  #   base_url: "http://localhost:8880/v1"
  #   model_name: "google/gemma-4-E2B-it"
  #   api_key: "not-needed"
  #   temperature: 0.3

  # --- 方案 A：共用 Ollama Nemotron 3 Super（有 thinking，first token 較慢）---
  # main_llm:
  #   _type: openai
  #   base_url: "http://localhost:11434/v1"
  #   model_name: "nemotron-3-super:latest"
  #   api_key: "ollama"
  #   temperature: 0.3

# -----------------------------------------------------------------------------
# Tools
# -----------------------------------------------------------------------------
functions:
  current_datetime:
    _type: current_datetime

  wiki_search:
    _type: wiki_search
    max_results: 2
    lang: zh
    doc_content_chars_max: 1000

  web_search:
    _type: tavily_internet_search
    max_results: 3
    api_key: "${TAVILY_API_KEY}"

  explain_scene:
    _type: explain_scene
    camera_index: 0
    # Camera source priority:
    #   1. relay_enabled: true in front_end → uses built-in WebSocket relay (recommended)
    #   2. remote_camera_url set → HTTP direct to Robot camera server
    #   3. Neither → local USB camera on NAT server
    # remote_camera_url: "http://172.29.107.223:9903"  # only needed if relay_enabled: false
    # --- 方案 C：Nemotron-3-Nano-Omni（當前啟用，與 main_llm 共用同一模型）---
    vlm_api_key: "not-needed"
    vlm_base_url: "http://localhost:8880/v1"
    vlm_model: "nemotron"
    # --- 方案 B：vLLM + Gemma4 E2B ---
    # vlm_api_key: "not-needed"
    # vlm_base_url: "http://localhost:8880/v1"
    # vlm_model: "google/gemma-4-E2B-it"
    # --- 方案 A：Ollama Nemotron（有 thinking 延遲）---
    # vlm_api_key: "ollama"
    # vlm_base_url: "http://localhost:11434/v1"
    # vlm_model: "nemotron-3-super:latest"
    default_prompt: "用繁體中文簡短描述畫面，50字內。"

  openclaw:
    _type: openclaw
    session_id: "voice-bridge"
    sync_timeout: 120
    async_timeout: 600

  # get_weather and get_lunar require custom NAT function registration (Phase 2)
  # get_weather:
  #   _type: get_weather
  #   api_host: "nu2tupq3cm.re.qweatherapi.com"
  #   api_key: "${QWEATHER_API_KEY}"
  #   default_location: "台北"
  #
  # get_lunar:
  #   _type: get_lunar

  # Custom workflow (LangGraph agent)
  voice_agent:
    _type: voice_agent
    llm_name: main_llm
    tool_names:
      - current_datetime
      - wiki_search
      - web_search
      - explain_scene
      - openclaw
    system_prompt: |
      You are Xiaozhi (小智), a Taiwanese female voice assistant.
      ALWAYS reply in Traditional Chinese (繁體中文). NEVER use Simplified Chinese or English.

      [Response rules]
      - Keep replies SHORT: 1-2 sentences, under 30 words. This is a VOICE assistant — long replies are bad UX.
      - NO markdown, NO bullet lists, NO numbering, NO asterisks, NO emoji.
      - Give direct answers. Do NOT explain your reasoning.

      [Tool routing]
      - Date/time questions → current_datetime
      - Weather, news, recommendations, health, anything you're unsure about → web_search
      - Describe what the camera sees → explain_scene
      - Knowledge/encyclopedia → wiki_search
      - Deep research, reports, send to WhatsApp/LINE → openclaw
      - Greetings, small talk → no tool needed
    max_iterations: 5
    verbose: true

# workflow key is required by NAT but unused by our custom front end —
# we directly build `voice_agent` function from the front-end register code.
workflow:
  _type: voice_agent
  llm_name: main_llm
  tool_names:
    - current_datetime
    - wiki_search
    - web_search
    - explain_scene
    - openclaw
